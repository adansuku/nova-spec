# nova-spec — framework configuration (template)
# This file is generated by the installer based on your answers.
# novaspec/config.yml is gitignored — don't push it to the repo.

branch:
  pattern: "{type}/{ticket}-{slug}"
  types:
    bugfix: bugfix
    hotfix: hotfix
    feature: feature
    documentation: docs
    refactor: refactor
    chore: chore
    architecture: arch
  ticket_case: upper    # upper | lower
  base: main            # base branch of the flow

forge:
  type: auto            # auto | github | gitlab | none
  cli: auto             # auto | gh | glab

ticket_system: jira     # jira | none

jira:
  skill: jira-integration            # set to "" to disable Jira
  url: https://your-workspace.atlassian.net
  project: PROJ
  email: you@example.com
  token: ${JIRA_API_TOKEN}            # create at id.atlassian.com/manage-profile/security/api-tokens

  done_transition_id: "21"            # legacy fallback (older nova-spec used this name)

  transitions:
    on_pr: "21"                       # ID of "Code Review" — used by /nova-wrap when PR is opened
    done:  "21"                       # legacy; nova-spec does NOT move to Done — Jira's
                                      # native forge integration does that on PR merge.
                                      # Kept here for backward compatibility only.
